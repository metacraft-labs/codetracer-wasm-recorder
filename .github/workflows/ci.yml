# CI — Lint, test, and build verification.
#
# This workflow runs on every push/PR and validates:
#   1. Go linting (go vet + nixfmt)
#   2. Pure-Go tests (no sibling repos needed)
#   3. Tracewriter FFI tests (requires codetracer-trace-format sibling)
#   4. Nix flake build verification
#
# POLICY: All CI steps should be reproducible locally via `just` targets.
# Local equivalents:
#   just lint
#   just test-tracewriter-go
#   just test-tracewriter        (requires FFI library from sibling)
#   just nix-build

name: CI

on:
  push:
    branches: [wasm-tracing, main]
  pull_request:
    branches: [wasm-tracing, main]

jobs:
  lint-and-test:
    runs-on: [self-hosted, nixos]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Nix and Git authentication
        uses: metacraft-labs/metacraft-github-actions/setup-nix@main
        with:
          gh-token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          substituters: ${{ vars.SUBSTITUTERS }}
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}

      - name: Resolve sibling refs
        id: resolve-ref
        run: |
          PINS=".github/sibling-pins"

          TF_REF="main"
          if [ -f "$PINS" ]; then
            TF_REF="$(grep '^codetracer-trace-format ' "$PINS" | cut -d' ' -f2)" || true
            TF_REF="${TF_REF:-main}"
          fi
          echo "trace_format_ref=$TF_REF" >> "$GITHUB_OUTPUT"
          echo "Resolved trace-format ref: $TF_REF"

      - name: Clone codetracer-trace-format
        uses: metacraft-labs/metacraft-github-actions/clone-repo@main
        with:
          repo: metacraft-labs/codetracer-trace-format
          ref: ${{ steps.resolve-ref.outputs.trace_format_ref }}
          path: ${{ github.workspace }}/../codetracer-trace-format
          gh-token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}

      - name: Lint
        run: nix develop --command just lint

      - name: Pure-Go tracewriter tests
        run: nix develop --command just test-tracewriter-go

      - name: Build FFI library and run tracewriter tests
        run: |
          nix develop --command bash -c '
            set -e

            # Build the FFI library from the sibling checkout
            cd ../codetracer-trace-format
            cargo build -p codetracer_trace_writer_ffi --release
            FFI_LIB_DIR="$(pwd)/target/release"

            # Run tracewriter tests with CGO linking to the FFI library
            cd "$GITHUB_WORKSPACE"
            CGO_ENABLED=1 \
            CGO_LDFLAGS="-L${FFI_LIB_DIR}" \
            LD_LIBRARY_PATH="${FFI_LIB_DIR}" \
              go test ./tracewriter/ -v
          '

  nix-build:
    name: Verify nix flake packages build
    runs-on: [self-hosted, nixos]
    steps:
      - uses: actions/checkout@v5

      - name: Setup Nix
        uses: metacraft-labs/metacraft-github-actions/setup-nix@main
        with:
          gh-token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          substituters: ${{ vars.SUBSTITUTERS }}
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}

      - name: Build default package
        run: nix build .#default
