name: Tracewriter Tests

on:
  pull_request:
    branches: [wasm-tracing, main]
  push:
    branches: [wasm-tracing, main]

permissions:
  contents: read

jobs:
  tracewriter:
    name: Tracewriter tests
    runs-on: [self-hosted, nixos]

    steps:
      - name: Checkout wasm-recorder
        uses: actions/checkout@v5
        with:
          path: codetracer-wasm-recorder

      - name: Check required secrets
        run: |
          TOKEN="${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}"
          if [[ -z "$TOKEN" ]]; then
            echo "::error::GH_READ_METACRAFT_PRIVATE_REPOS secret is not configured."
            exit 1
          fi

      - name: Setup Nix and Git authentication
        uses: metacraft-labs/metacraft-github-actions/setup-nix@main
        with:
          gh-token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          substituters: ${{ vars.SUBSTITUTERS }}
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}

      - name: Resolve sibling refs
        id: resolve-refs
        run: |
          PINS="codetracer-wasm-recorder/.github/sibling-pins.json"

          CT_REF="main"
          if [[ -f "$PINS" ]]; then
            CT_REF=$(grep '"codetracer"' "$PINS" | head -1 | sed 's/.*: *"\([^"]*\)".*/\1/')
            CT_REF="${CT_REF:-main}"
          fi
          echo "codetracer_ref=$CT_REF" >> "$GITHUB_OUTPUT"

          TR_REF="master"
          if [[ -f "$PINS" ]]; then
            TR_REF=$(grep '"trace_record"' "$PINS" | head -1 | sed 's/.*: *"\([^"]*\)".*/\1/')
            TR_REF="${TR_REF:-master}"
          fi
          echo "trace_record_ref=$TR_REF" >> "$GITHUB_OUTPUT"

          TF_REF="main"
          if [[ -f "$PINS" ]]; then
            TF_REF=$(grep '"codetracer-trace-format"' "$PINS" | head -1 | sed 's/.*: *"\([^"]*\)".*/\1/')
            TF_REF="${TF_REF:-main}"
          fi
          echo "trace_format_ref=$TF_REF" >> "$GITHUB_OUTPUT"

          echo "Resolved codetracer ref: $CT_REF"
          echo "Resolved trace_record ref: $TR_REF"
          echo "Resolved trace-format ref: $TF_REF"

      - name: Clone codetracer
        uses: metacraft-labs/metacraft-github-actions/clone-repo@main
        with:
          repo: metacraft-labs/codetracer
          ref: ${{ steps.resolve-refs.outputs.codetracer_ref }}
          path: codetracer
          gh-token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}
          submodules: 'true'

      - name: Clone trace_record
        uses: metacraft-labs/metacraft-github-actions/clone-repo@main
        with:
          repo: metacraft-labs/trace_record
          ref: ${{ steps.resolve-refs.outputs.trace_record_ref }}
          path: trace_record
          gh-token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}

      - name: Clone codetracer-trace-format
        uses: metacraft-labs/metacraft-github-actions/clone-repo@main
        with:
          repo: metacraft-labs/codetracer-trace-format
          ref: ${{ steps.resolve-refs.outputs.trace_format_ref }}
          path: codetracer-trace-format
          gh-token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}

      - name: Build FFI library and run tracewriter tests
        run: |
          cd codetracer-wasm-recorder
          nix develop ../codetracer?submodules=1 --command bash -c '
            set -e

            # rustup override is directory-specific to codetracer workspace;
            # set RUSTUP_TOOLCHAIN so cargo works from other directories too
            export RUSTUP_TOOLCHAIN=1.89

            # Build the FFI library
            cd ../codetracer-trace-format
            cargo build -p codetracer_trace_writer_ffi --release
            echo "FFI library built:"
            ls -la target/release/libcodetracer_trace_writer_ffi.*
            FFI_LIB_DIR="$(pwd)/target/release"

            # Run tracewriter tests with CGO linking to the FFI library
            cd ../codetracer-wasm-recorder
            CGO_ENABLED=1 \
            CGO_LDFLAGS="-L${FFI_LIB_DIR}" \
            LD_LIBRARY_PATH="${FFI_LIB_DIR}" \
              go test ./tracewriter/ -v
          '
